<section class="team-card">
  <h2 class="title">Team Details</h2>

  <div class="row"><span class="label">Team ID: </span><span class="value">{{ team.teamId }}</span></div>
  <div class="row"><span class="label">Team Name: </span><span class="value">{{ team.teamName }}</span></div>
  <div class="row"><span class="label">Location: </span><span class="value">{{ team.location }}</span></div>
  <div class="row"><span class="label">Owner Name: </span><span class="value">{{ team.ownerName }}</span></div>
  <div class="row"><span class="label">Establishment Year: </span><span class="value">{{ team.establishmentYear }}</span></div>
</section>
