<div class="team-form-container">
<form [formGroup]="teamForm" (ngSubmit)="onSubmit()">
<div>
<label for="teamId">Team ID:</label>
<input id="teamId" formControlName="teamId" type="number" placeholder="Enter Team ID" />
<div *ngIf="teamForm.get('teamId')?.invalid && teamForm.get('teamId')?.touched">
<small class="error">Team ID is required and must be a positive number.</small>
</div>
</div>
<div>
<label for="teamName">Team Name:</label>
<input id="teamName" formControlName="teamName" type="text" placeholder="Enter Team Name" />
<div *ngIf="teamForm.get('teamName')?.invalid && teamForm.get('teamName')?.touched">
<small class="error">Team Name is required and must be at least 2 characters long.</small>
</div>
</div>
<div>
<label for="location">Location:</label>
<input id="location" formControlName="location" type="text" placeholder="Enter Location" />
<div *ngIf="teamForm.get('location')?.invalid && teamForm.get('location')?.touched">
<small class="error">Location is required.</small>
</div>
</div>
<div>
<label for="ownerName">Owner Name:</label>
<input id="ownerName" formControlName="ownerName" type="text" placeholder="Enter Owner Name" />
<div *ngIf="teamForm.get('ownerName')?.invalid && teamForm.get('ownerName')?.touched">
<small class="error">Owner Name is required and must be at least 2 characters long.</small>
</div>
</div>
<div>
<label for="establishmentYear">Establishment Year:</label>
<input id="establishmentYear" formControlName="establishmentYear" type="number" placeholder="Enter Establishment Year" />
</div>
<!-- Event Binding: onSubmit -->
<button type="submit" [disabled]="teamForm.invalid">Create Team</button>
<!-- Event Binding: onReset -->
<button type="button" (click)="resetForm()">Reset Form</button>
</form>
<!-- Display Success or Error Messages -->
<div *ngIf="successMessage" class="success">
<p>{{ successMessage }}</p>
</div>
<div *ngIf="errorMessage" class="error">
<p>{{ errorMessage }}</p>
</div>
</div>
